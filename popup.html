<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="popup.css">
</head>
<body>

  <h2>GFG Sync</h2>

  <input
    id="token"
    placeholder="GitHub Token"
  />

  <input
    id="owner"
    placeholder="GitHub Username"
  />

  <input
    id="repo"
    placeholder="Repository Name"
  />

  <button id="save">
    Save Settings
  </button>

  <button id="githubLogin">
  Login with GitHub
</button>

  <script src="popup.js"></script>

</body>
</html>
